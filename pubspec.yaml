name: kezaio
description: KezaIO - Your private AI life advisor
publish_to: none
version: 1.0.0+1

# Copyright (c) 2026 Jiamini Innovations Ltd. All rights reserved.

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Network
  dio: ^5.4.3+1
  retrofit: ^4.1.0

  # Local storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.1
  hive_flutter: ^1.1.0

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2

  # Auth
  google_sign_in: ^6.2.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  logger: ^2.4.0
  connectivity_plus: ^6.0.3

  # File & media
  image_picker: ^1.1.2
  file_picker: ^8.0.3
  path_provider: ^2.1.3
  open_file: ^3.3.2

  # Notifications
  flutter_local_notifications: ^17.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  retrofit_generator: ^8.1.0
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
